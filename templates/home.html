<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Anime Manager - Portail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .choice-card { cursor: pointer; transition: transform 0.2s; background: #2a2a3e; border: 2px solid transparent; }
        .choice-card:hover { transform: scale(1.05); border-color: #0d6efd; box-shadow: 0 0 20px rgba(13, 110, 253, 0.4); }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-5">Bienvenue sur Anime Manager Pro</h1>
        <div class="row justify-content-center g-4">

            <div class="col-md-4">
                <div class="card choice-card h-100 p-4" onclick="window.location.href='/en'">
                    <h3 class="card-title mb-3">🇬🇧 Anglais</h3>
                    <p class="text-secondary">Téléchargements via AniList + AnimeHeaven.</p>
                    <p class="badge bg-primary fs-6 mt-3">Synchronisé</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card choice-card h-100 p-4" onclick="window.location.href='/fr'">
                    <h3 class="card-title mb-3">🇫🇷 Français</h3>
                    <p class="text-secondary">Recherche et téléchargements sur Anime-Sama.</p>
                    <p class="badge bg-danger fs-6 mt-3">Recherche Auto</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card choice-card h-100 p-4" onclick="window.location.href='/anilist'">
                    <h3 class="card-title mb-3 text-info">📘 AniList</h3>
                    <p class="text-secondary">Gère toutes les listes de ton compte et ajoute des nouveautés.</p>
                    <p class="badge bg-info text-dark fs-6 mt-3">Base de Données</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
