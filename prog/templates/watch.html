<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ anime_title }} - Episode {{ episode }}</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet" />
    <style>
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #2a2a3e;
            --bg-tertiary: #3a3a4e;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --accent-blue: #0d6efd;
            --accent-green: #198754;
            --accent-red: #dc3545;
            --accent-yellow: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: var(--bg-secondary);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--bg-tertiary);
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-btn {
            background: var(--bg-tertiary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .nav-btn:hover { background: #4a4a5e; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-btn.complete-btn { background: var(--accent-green); }
        .nav-btn.complete-btn:hover { background: #157347; }

        .anime-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-primary);
            flex-grow: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 0;
            position: relative;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            outline: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 20px 20px;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }

        .video-controls.show {
            opacity: 1;
            pointer-events: auto;
        }

        .video-container.idle {
            cursor: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 3px;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar-container:hover .progress-bar::after {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .controls-left, .controls-center, .controls-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 0.9rem;
            min-width: 100px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
        }

        .speed-control {
            position: relative;
        }

        .speed-btn {
            background: var(--bg-tertiary);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .speed-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 0;
            margin-bottom: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
            min-width: 100px;
        }

        .speed-menu.show {
            display: block;
        }

        .speed-option {
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .speed-option:hover {
            background: var(--bg-tertiary);
        }

        .speed-option.active {
            color: var(--accent-blue);
            font-weight: bold;
        }

        .bottom-panel {
            background: var(--bg-secondary);
            border-top: 1px solid var(--bg-tertiary);
            flex-shrink: 0;
            max-height: 30vh;
            display: flex;
            flex-direction: column;
        }

        .bottom-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--bg-tertiary);
            flex-wrap: wrap;
        }

        .ep-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .ep-list-inner {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ep-btn {
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            color: white;
            width: 50px;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .ep-btn:hover { background: #4a4a5e; }
        .ep-btn.current {
            border-color: #fff !important;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.8);
            font-size: 1.1rem;
            font-weight: bold;
            background: var(--accent-blue);
        }
        .ep-btn.watched { background: var(--accent-red); }
        .ep-btn.downloaded { background: var(--accent-green); }
        .ep-btn.watched.current { 
            background: var(--accent-red); 
            border-color: #fff !important;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.8);
        }
        .ep-btn.downloaded.current { 
            background: var(--accent-green); 
            border-color: #fff !important;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(25, 135, 84, 0.8);
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .action-btn.delete { background: var(--accent-red); color: white; }
        .action-btn.sync { background: #0dcaf0; color: black; }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            display: none;
        }

        .loading-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 8px 10px;
                gap: 8px;
            }

            .anime-title {
                font-size: 0.9rem;
            }

            .nav-btn {
                padding: 6px 10px;
                font-size: 0.85rem;
            }

            .time-display {
                font-size: 0.8rem;
                min-width: auto;
            }

            .volume-slider {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    {% include 'toast.html' %}
    <div class="top-bar">
        <button class="nav-btn" onclick="goBack()">&#11013;&#65039; Retour</button>
        <a href="/" class="nav-btn" style="text-decoration: none; padding: 8px 16px; background: var(--bg-tertiary); color: white; border-radius: 5px;">⬅️ Portail</a>
        <span class="anime-title">{{ anime_title }} - Ep {{ episode }}</span>
        <button class="nav-btn" id="prevBtn" onclick="prevEpisode()" {{ 'disabled' if not has_prev else '' }}>&#11013; Prec.</button>
        {% if is_last %}
        <button class="nav-btn complete-btn" onclick="completeSeason()">&#10003; Terminer</button>
        {% else %}
        <button class="nav-btn" id="nextBtn" onclick="nextEpisode()" {{ 'disabled' if not has_next else '' }}>Suiv. &#10145;</button>
        {% endif %}
    </div>

    <div class="video-container">
        <video id="videoPlayer" preload="metadata">
            <source src="/api/watch/stream/{{ nom_dossier }}/{{ episode }}" type="video/mp4">
            Votre navigateur ne supporte pas la lecture video.
        </video>
        <div class="loading-overlay" id="loadingOverlay">&#8987; Chargement...</div>
        <div class="video-controls" id="videoControls">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="controls-row">
                <div class="controls-left">
                    <button class="control-btn" onclick="togglePlay()" id="playBtn">&#9658;</button>
                    <button class="control-btn" onclick="skip(-10)">&#8722;10s</button>
                    <button class="control-btn" onclick="skip(10)">+10s</button>
                    <button class="control-btn" onclick="skip(80)">+80s</button>
                    <button class="control-btn" onclick="toggleMute()" id="muteBtn">&#9834;</button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                    <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                    {% if next_episode %}
                    <button class="control-btn text-success" onclick="nextEpisode()" title="Episode suivant">&#9654; Ep {{ next_episode }}</button>
                    {% endif %}
                </div>
                <div class="controls-center">
                </div>
                <div class="controls-right">
                    <div class="speed-control">
                        <button class="speed-btn" id="speedBtn" onclick="toggleSpeedMenu()">1x</button>
                        <div class="speed-menu" id="speedMenu">
                            <div class="speed-option" data-speed="0.5" onclick="setSpeed(0.5)">0.5x</div>
                            <div class="speed-option" data-speed="0.75" onclick="setSpeed(0.75)">0.75x</div>
                            <div class="speed-option" data-speed="1" onclick="setSpeed(1)">1x</div>
                            <div class="speed-option" data-speed="1.25" onclick="setSpeed(1.25)">1.25x</div>
                            <div class="speed-option" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</div>
                            <div class="speed-option" data-speed="1.75" onclick="setSpeed(1.75)">1.75x</div>
                            <div class="speed-option" data-speed="2" onclick="setSpeed(2)">2x</div>
                            <div class="speed-option" data-speed="2.25" onclick="setSpeed(2.25)">2.25x</div>
                            <div class="speed-option" data-speed="2.5" onclick="setSpeed(2.5)">2.5x</div>
                            <div class="speed-option" data-speed="2.75" onclick="setSpeed(2.75)">2.75x</div>
                            <div class="speed-option" data-speed="3" onclick="setSpeed(3)">3x</div>
                            <div class="speed-option" data-speed="3.25" onclick="setSpeed(3.25)">3.25x</div>
                            <div class="speed-option" data-speed="3.5" onclick="setSpeed(3.5)">3.5x</div>
                            <div class="speed-option" data-speed="3.75" onclick="setSpeed(3.75)">3.75x</div>
                            <div class="speed-option" data-speed="4" onclick="setSpeed(4)">4x</div>
                            <div class="speed-option" data-speed="4.25" onclick="setSpeed(4.25)">4.25x</div>
                            <div class="speed-option" data-speed="4.5" onclick="setSpeed(4.5)">4.5x</div>
                            <div class="speed-option" data-speed="4.75" onclick="setSpeed(4.75)">4.75x</div>
                            <div class="speed-option" data-speed="5" onclick="setSpeed(5)">5x</div>
                        </div>
                    </div>
                    <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen">&#9974;</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="ep-list">
            <div class="ep-list-inner" id="epList"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        const CURRENT_NOM_DOSSIER = "{{ nom_dossier }}";
        const CURRENT_EPISODE = {{ episode }};
        const TOTAL_EPISODES = {{ total_episodes }};
        const CURRENT_PROGRESS = {{ current_progress }};
        const HAS_PREV = {{ 'true' if has_prev else 'false' }};
        const HAS_NEXT = {{ 'true' if has_next else 'false' }};
        const PREV_EP = {{ prev_episode if prev_episode else 'null' }};
        const NEXT_EP = {{ next_episode if next_episode else 'null' }};
        const IS_LAST = {{ 'true' if is_last else 'false' }};

        const video = document.getElementById('videoPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        const speedBtn = document.getElementById('speedBtn');
        const speedMenu = document.getElementById('speedMenu');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let hideControlsTimeout;

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        function updatePlayButton() {
            playBtn.innerHTML = video.paused ? '&#9658;' : '&#10074;&#10074;';
        }

        function skip(seconds) {
            video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
        }

        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '&#9833;' : '&#9834;';
            volumeSlider.value = video.muted ? 0 : video.volume;
        }

        function toggleSpeedMenu() {
            speedMenu.classList.toggle('show');
        }

        function setSpeed(speed) {
            video.playbackRate = speed;
            speedBtn.textContent = speed + 'x';
            speedMenu.classList.remove('show');

            document.querySelectorAll('.speed-option').forEach(opt => {
                opt.classList.remove('active');
                if (parseFloat(opt.dataset.speed) === speed) {
                    opt.classList.add('active');
                }
            });
        }

        function toggleFullscreen() {
            const container = document.querySelector('.video-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen();
            }
        }

        function showControls() {
            const container = document.querySelector('.video-container');
            container.classList.remove('idle');
            document.getElementById('videoControls').classList.add('show');
            clearTimeout(hideControlsTimeout);
            hideControlsTimeout = setTimeout(() => {
                if (!video.paused) {
                    document.getElementById('videoControls').classList.remove('show');
                    container.classList.add('idle');
                }
            }, 5000);
        }

        const videoContainer = document.querySelector('.video-container');
        videoContainer.addEventListener('mousemove', showControls);
        videoContainer.addEventListener('touchstart', showControls);
        videoContainer.addEventListener('mouseleave', () => {
            clearTimeout(hideControlsTimeout);
            if (!video.paused) {
                document.getElementById('videoControls').classList.remove('show');
                videoContainer.classList.add('idle');
            }
        });

        video.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration || 0)}`;
        });

        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percent + '%';
            }
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration || 0)}`;
        });

        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const percent = (bufferedEnd / video.duration) * 100;
                progressBar.style.background = `linear-gradient(to right, var(--accent-blue) ${percent}%, rgba(255,255,255,0.3) ${percent}%)`;
            }
        });

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', updatePlayButton);

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = e.target.value == 0;
            muteBtn.innerHTML = video.muted ? '&#9833;' : '&#9834;';
        });

        video.addEventListener('click', () => {
            togglePlay();
            showControls();
        });

        speedMenu.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.addEventListener('click', (e) => {
            if (!speedMenu.contains(e.target) && e.target !== speedBtn) {
                speedMenu.classList.remove('show');
            }
        });

        async function loadEpisodeList() {
            try {
                const response = await fetch(`/api/details/${CURRENT_NOM_DOSSIER}`);
                const data = await response.json();
                renderEpisodeList(data.episodes, data.progress);
            } catch (error) {
                console.error('Failed to load episode list:', error);
            }
        }

        function renderEpisodeList(episodes, progress) {
            const container = document.getElementById('epList');
            container.innerHTML = '';
            episodes.forEach(ep => {
                const btn = document.createElement('button');
                let classes = 'ep-btn';
                if (ep.ep === CURRENT_EPISODE) classes += ' current';

                // downloaded or watched: file exists
                if (ep.status === 'downloaded' || ep.status === 'watched_kept') {
                    if (ep.ep <= progress) {
                        classes += ' watched'; // red - synced/watched
                    } else {
                        classes += ' downloaded'; // green - downloaded but not watched
                    }
                }

                btn.className = classes;
                btn.innerText = ep.ep;

                // Only clickable if downloaded
                if (ep.status === 'downloaded' || ep.status === 'watched_kept') {
                    btn.onclick = () => {
                        if (ep.ep !== CURRENT_EPISODE) {
                            window.location.href = `/watch/${CURRENT_NOM_DOSSIER}/${ep.ep}`;
                        }
                    };
                    btn.style.cursor = 'pointer';
                } else {
                    btn.style.cursor = 'default';
                    btn.style.opacity = '0.6';
                }

                container.appendChild(btn);
            });
        }

        function goBack() {
            history.back();
        }

        function prevEpisode() {
            if (PREV_EP) {
                window.location.href = `/watch/${CURRENT_NOM_DOSSIER}/${PREV_EP}`;
            }
        }

        function nextEpisode() {
            if (NEXT_EP) {
                window.location.href = `/watch/${CURRENT_NOM_DOSSIER}/${NEXT_EP}`;
            }
        }

        async function completeSeason() {
            if (!confirm('Marquer cette saison comme terminée et supprimer les fichiers téléchargés ?')) return;
            await fetch('/api/complete_season', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom_dossier: CURRENT_NOM_DOSSIER })
            });
            window.location.href = '/en';
        }

        async function syncProgress() {
            await fetch('/api/sync_anilist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    media_id: null,
                    last_episode: CURRENT_EPISODE,
                    total_episodes: TOTAL_EPISODES || null
                })
            });
            showToast('Succès', 'Progression synchronisée !', 'success');
        }

        async function deleteWatched() {
            if (!confirm('Supprimer tous les épisodes déjà vus (avant l\'épisode actuel) ?')) return;
            await fetch('/api/update_progress', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nom_dossier: CURRENT_NOM_DOSSIER,
                    current_episode: CURRENT_EPISODE,
                    media_id: null,
                    total_episodes: TOTAL_EPISODES || null
                })
            });
            loadEpisodeList();
            showToast('Succès', 'Épisodes supprimés', 'success');
        }

        video.addEventListener('waiting', () => {
            loadingOverlay.classList.add('show');
        });

        video.addEventListener('canplay', () => {
            loadingOverlay.classList.remove('show');
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            switch(e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    skip(-10);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    skip(10);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    volumeSlider.value = video.volume;
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    volumeSlider.value = video.volume;
                    break;
                case 'm':
                    toggleMute();
                    break;
                case 'f':
                    toggleFullscreen();
                    break;
                case 'Escape':
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        goBack();
                    }
                    break;
            }

            if (e.key >= '1' && e.key <= '9') {
                const percent = parseInt(e.key) * 10;
                video.currentTime = (percent / 100) * video.duration;
            }
        });

        loadEpisodeList();
    </script>
</body>
</html>
