<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Nettoyage Stockage</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; padding: 20px; }
        .folder-item { background: #2a2a3e; border: 1px solid #3d3d5c; border-radius: 8px; margin-bottom: 10px; padding: 12px; }
        .folder-item.empty-folder { border-color: #dc3545; }
        .folder-item.empty-on-list { border-color: #6c757d; }
        .folder-item.orphaned-folder { border-color: #ffc107; }
        .folder-cover { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .folder-name { font-weight: bold; color: #fff; }
        .folder-status { font-size: 0.9em; padding: 4px 8px; border-radius: 4px; }
        .status-watching { background: #0d6efd; color: #fff; }
        .status-planning { background: #6f42c1; color: #fff; }
        .status-completed { background: #198754; color: #fff; }
        .status-autre { background: #6c757d; color: #fff; }
        .status-empty { background: #dc3545; color: #fff; }
        .status-orphelin { background: #ffc107; color: #000; }
        .checkbox-wrapper input { width: 20px; height: 20px; }
    </style>
</head>
<body>
    {% include 'toast.html' %}
    <div class="container">
        <a href="/" class="btn btn-outline-light btn-sm mb-4">⬅️ Retour Portail</a>
        <h2 class="mb-4">🧹 Nettoyage Stockage</h2>
        
        <div class="mb-4">
            <button class="btn btn-primary" onclick="scanFolders()">🔍 Scanner le dossier Anime</button>
            <button class="btn btn-warning" onclick="clearScraperCache()">🗑️ Vider le cache réseau (Scraping)</button>
        </div>

        <div id="scan-results">
            <div class="text-secondary">Cliquez sur "Scanner" pour analyser les dossiers.</div>
        </div>

        <div class="mt-4" id="delete-section" style="display:none;">
            <button class="btn btn-danger" onclick="deleteSelected()">🗑️ Supprimer la sélection</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        function scanFolders() {
            const results = document.getElementById('scan-results');
            results.innerHTML = '<div class="text-warning">Analyse en cours...</div>';
            
            fetch('/api/cleanup/scan')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        renderFolders(data.data);
                    } else {
                        results.innerHTML = '<div class="text-danger">Erreur: ' + (data.error || 'Inconnu') + '</div>';
                    }
                })
                .catch(e => {
                    results.innerHTML = '<div class="text-danger">Erreur de connexion</div>';
                });
        }

        function getStatusBadge(status, type) {
            const statusClass = {
                'Watching': 'status-watching',
                'Planning': 'status-planning',
                'Completed': 'status-completed',
                'Orphelin': 'status-orphelin'
            };
            const label = status === 'Orphelin' ? 'Orphelin' : status;
            return `<span class="folder-status ${statusClass[status] || 'status-autre'}">${label}</span>`;
        }

        function getFolderTypeLabel(type, status) {
            if (type === 'empty') return 'Dossier vide';
            if (type === 'empty_on_list') return 'Aucun épisode téléchargé';
            if (type === 'orphaned') return 'Non suivi dans vos listes';
            return '';
        }

        function renderFolderCard(f) {
            const coverImg = f.cover ? `<img src="/api/cleanup/cover?path=${encodeURIComponent(f.name)}" class="folder-cover me-3" loading="lazy" onerror="this.style.display='none'" />` : '';
            const typeClass = f.type === 'empty' ? 'empty-folder' : (f.type === 'empty_on_list' ? 'empty-on-list' : 'orphaned-folder');
            const typeLabel = getFolderTypeLabel(f.type, f.status);
            
            return `
                <div class="folder-item ${typeClass} d-flex align-items-center">
                    <div class="checkbox-wrapper me-3">
                        <input type="checkbox" data-folder="${f.name}" />
                    </div>
                    ${coverImg}
                    <div class="flex-grow-1">
                        <div class="folder-name">${f.name}</div>
                        <div class="d-flex align-items-center gap-2 mt-1">
                            ${getStatusBadge(f.status, f.type)}
                            <span class="text-secondary small">${typeLabel}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFolders(data) {
            const results = document.getElementById('scan-results');
            
            const allItems = [
                ...(data.empty || []),
                ...(data.empty_on_list || []),
                ...(data.orphaned || [])
            ];
            
            if (allItems.length === 0) {
                results.innerHTML = '<div class="text-success">Aucun dossier à nettoyer!</div>';
                return;
            }
            
            const groups = {};
            const groupOrder = ['Watching', 'Planning', 'Completed', 'Orphelin', 'Autre'];
            
            allItems.forEach(f => {
                const status = f.status || 'Autre';
                if (!groups[status]) groups[status] = [];
                groups[status].push(f);
            });
            
            let html = '';
            
            groupOrder.forEach(status => {
                if (!groups[status] || groups[status].length === 0) return;
                
                const statusClass = {
                    'Watching': 'text-primary',
                    'Planning': 'text-purple',
                    'Completed': 'text-success',
                    'Orphelin': 'text-warning',
                    'Autre': 'text-secondary'
                };
                
                const statusBg = {
                    'Watching': '#0d6efd',
                    'Planning': '#6f42c1',
                    'Completed': '#198754',
                    'Orphelin': '#ffc107',
                    'Autre': '#6c757d'
                };
                
                html += `
                    <div class="group-section mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
                            <h5 class="m-0 ${statusClass[status]}" style="color: ${statusBg[status]} !important;">
                                ${status === 'Orphelin' ? '🔴 Orphelins' : (status === 'Completed' ? '🟢 Terminés' : (status === 'Planning' ? '🟣 À Venir' : (status === 'Watching' ? '🔵 En Cours' : '⚪ Inconnu')))}
                            </h5>
                            <label class="d-flex align-items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="select-all-group" data-group="${status}" onchange="toggleGroup('${status}', this.checked)" />
                                <span class="small">Tout sélectionner</span>
                            </label>
                        </div>
                        <div class="group-items" data-group="${status}">
                `;
                
                groups[status].forEach(f => {
                    html += renderFolderCard(f);
                });
                
                html += '</div></div>';
            });
            
            results.innerHTML = html;
            document.getElementById('delete-section').style.display = 'block';
        }
        
        function toggleGroup(status, checked) {
            const groupItems = document.querySelectorAll(`.group-items[data-group="${status}"] input[type="checkbox"]`);
            groupItems.forEach(cb => {
                cb.checked = checked;
            });
        }

        function deleteSelected() {
            const checkboxes = document.querySelectorAll('#scan-results input[type="checkbox"]:checked');
            const folders = Array.from(checkboxes).map(cb => cb.dataset.folder);
            
            if (folders.length === 0) {
                showToast('Attention', 'Sélectionnez au moins un dossier à supprimer', 'warning');
                return;
            }

            if (!confirm(`Supprimer ${folders.length} dossier(s)? Cette action est irréversible.`)) {
                return;
            }

            fetch('/api/cleanup/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({folders: folders})
            })
            .then(r => r.json())
            .then(data => {
                showToast('Succès', `Supprimé(s): ${data.deleted.join(', ')}`, 'success');
                scanFolders();
            })
            .catch(e => {
                showToast('Erreur', 'Erreur lors de la suppression', 'error');
            });
        }

        function clearScraperCache() {
            fetch('/api/cleanup/clear_cache', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showToast('Succès', 'Cache réseau vidé', 'success');
                    } else {
                        showToast('Erreur', data.error || 'Erreur inconnue', 'error');
                    }
                })
                .catch(e => {
                    showToast('Erreur', 'Erreur de connexion', 'error');
                });
        }
    </script>
</body>
</html>
