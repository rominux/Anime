<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Calendrier des Sorties</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; padding: 20px; }
        .schedule-table { background: #2a2a3e; border-collapse: separate; border-spacing: 0 10px; }
        .schedule-table th { background: #3d3d5c; padding: 12px; text-align: left; }
        .schedule-table td { background: #2a2a3e; padding: 12px; vertical-align: middle; }
        .schedule-table tr td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .schedule-table tr td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        .anime-cover { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; }
        .day-header { background: #3d3d5c; padding: 15px; border-radius: 8px; margin: 25px 0 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn btn-outline-light mb-4">← Menu Principal</a>
        <h2 class="mb-4">📅 Calendrier des Sorties</h2>
        
        <div id="schedule-container">
            <div class="text-center text-secondary">Chargement du calendrier...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadSchedule() {
            fetch('/api/schedule')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('schedule-container');
                    
                    if (!data.success || !data.schedule || data.schedule.length === 0) {
                        container.innerHTML = '<div class="text-secondary">Aucune upcoming release trouvée</div>';
                        return;
                    }

                    const dayNames = {
                        'Monday': 'Lundi',
                        'Tuesday': 'Mardi',
                        'Wednesday': 'Mercredi',
                        'Thursday': 'Jeudi',
                        'Friday': 'Vendredi',
                        'Saturday': 'Samedi',
                        'Sunday': 'Dimanche'
                    };

                    const byDay = {};
                    data.schedule.forEach(item => {
                        const date = new Date(item.airing_at * 1000);
                        const dayKey = date.toISOString().split('T')[0];
                        if (!byDay[dayKey]) byDay[dayKey] = [];
                        byDay[dayKey].push({...item, date});
                    });

                    let html = '';
                    const sortedDays = Object.keys(byDay).sort((a, b) => new Date(a) - new Date(b));

                    sortedDays.forEach(dayKey => {
                        const items = byDay[dayKey];
                        const firstDate = items[0].date;
                        const dayName = dayNames[firstDate.toLocaleDateString('en-US', {weekday: 'long'})] || firstDate.toLocaleDateString('fr-FR', {weekday: 'long'});
                        const dayNum = firstDate.getDate();
                        const monthName = firstDate.toLocaleDateString('fr-FR', {month: 'long'});
                        
                        html += `<div class="day-header"><h5 class="mb-0">${dayName} ${dayNum} ${monthName}</h5></div>`;
                        
                        html += '<table class="table schedule-table">';
                        html += '<thead><tr><th style="width:100px">Image</th><th>Titre</th><th style="width:100px">Épisode</th><th style="width:120px">Heure</th></tr></thead>';
                        html += '<tbody>';
                        
                        items.forEach(item => {
                            const time = item.date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
                            html += `
                                <tr>
                                    <td><img src="${item.cover || ''}" class="anime-cover" onerror="this.style.display='none'" /></td>
                                    <td class="text-light fw-bold">${item.title}</td>
                                    <td class="text-info">#${item.episode}</td>
                                    <td class="text-warning">${time}</td>
                                </tr>
                            `;
                        });
                        
                        html += '</tbody></table>';
                    });

                    container.innerHTML = html;
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('schedule-container').innerHTML = '<div class="text-danger">Erreur de chargement</div>';
                });
        }

        loadSchedule();
    </script>
</body>
</html>
