<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Calendrier des Sorties</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; padding: 20px; }
        .schedule-card { background: #2a2a3e; border: 1px solid #3d3d5c; margin-bottom: 15px; }
        .anime-cover { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; }
        .day-header { background: #3d3d5c; padding: 10px; border-radius: 5px; margin: 20px 0 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn btn-outline-light mb-4">← Retour</a>
        <h2 class="mb-4">📅 Calendrier des Sorties</h2>
        
        <div id="schedule-container">
            <div class="text-center text-secondary">Chargement du calendrier...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadSchedule() {
            fetch('/api/schedule')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('schedule-container');
                    
                    if (!data.success || !data.schedule || data.schedule.length === 0) {
                        container.innerHTML = '<div class="text-secondary">Aucune upcoming release trouvée</div>';
                        return;
                    }

                    const byDate = {};
                    data.schedule.forEach(item => {
                        const date = new Date(item.airing_at * 1000);
                        const key = date.toDateString();
                        if (!byDate[key]) byDate[key] = [];
                        byDate[key].push({...item, date});
                    });

                    let html = '';
                    Object.keys(byDate).sort((a, b) => new Date(a) - new Date(b)).forEach(dateKey => {
                        const items = byDate[dateKey];
                        const dateObj = items[0].date;
                        const dayName = dateObj.toLocaleDateString('fr-FR', {weekday: 'long', day: 'numeric', month: 'long'});
                        
                        html += `<div class="day-header"><h5 class="mb-0">${dayName}</h5></div>`;
                        
                        items.forEach(item => {
                            const time = item.date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
                            html += `
                                <div class="card schedule-card p-3 d-flex align-items-center">
                                    <img src="${item.cover || ''}" class="anime-cover me-3" onerror="this.style.display='none'" />
                                    <div class="flex-grow-1">
                                        <strong>${item.title}</strong>
                                        <div class="text-info">Épisode ${item.episode}</div>
                                    </div>
                                    <div class="text-warning">${time}</div>
                                </div>
                            `;
                        });
                    });

                    container.innerHTML = html;
                })
                .catch(e => {
                    document.getElementById('schedule-container').innerHTML = '<div class="text-danger">Erreur de chargement</div>';
                });
        }

        loadSchedule();
    </script>
</body>
</html>
