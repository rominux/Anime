<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Calendrier des Sorties</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; padding: 20px; }
        .day-header { background: #3d3d5c; padding: 15px; border-radius: 8px; margin: 25px 0 15px; }
        .folder-item { background: #2a2a3e; border: 1px solid #3d3d5c; border-radius: 8px; margin-bottom: 10px; padding: 12px; }
        .folder-cover { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .folder-name { font-weight: bold; color: #fff; }
        .folder-meta { color: #8b8bb3; font-size: 0.9em; }
        .folder-time { color: #ffc107; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn btn-outline-light btn-sm mb-4">⬅️ Retour Portail</a>
        <h2 class="mb-4">📅 Calendrier des Sorties</h2>
        
        <div id="schedule-container">
            <div class="text-center text-secondary">Chargement du calendrier...</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        function loadSchedule() {
            fetch('/api/schedule')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('schedule-container');
                    
                    if (!data.success || !data.schedule || data.schedule.length === 0) {
                        container.innerHTML = '<div class="text-secondary">Aucune upcoming release trouvée</div>';
                        return;
                    }

                    let html = '';

                    data.schedule.forEach(dayBlock => {
                        html += `<div class="day-header"><h5 class="mb-0">${dayBlock.day_name} ${dayBlock.day_num} ${dayBlock.month}</h5></div>`;
                        
                        dayBlock.animes.forEach(item => {
                            html += `
                                <div class="folder-item d-flex align-items-center">
                                    <img src="${item.cover || ''}" class="folder-cover me-3" loading="lazy" onerror="this.style.display='none'" />
                                    <div class="flex-grow-1">
                                        <div class="folder-name">${item.title}</div>
                                        <div class="folder-meta">Épisode ${item.episode} - ${dayBlock.day_name}</div>
                                    </div>
                                    <div class="folder-time">${item.airing_time}</div>
                                </div>
                            `;
                        });
                    });

                    container.innerHTML = html;
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('schedule-container').innerHTML = '<div class="text-danger">Erreur de chargement</div>';
                });
        }

        loadSchedule();
    </script>
</body>
</html>
