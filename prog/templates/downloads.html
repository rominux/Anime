<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Téléchargements & Calendrier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #1e1e2e; color: #fff; padding: 20px; }
        .nav-tabs .nav-link { color: #aaa; }
        .nav-tabs .nav-link.active { background-color: #2a2a3e; color: #fff; border-color: #3d3d5c; }
        .episode-card { background: #2a2a3e; border: 1px solid #3d3d5c; margin-bottom: 10px; border-radius: 8px; }
        .active-download { background: #1a3a1a; border-color: #28a745; }
        .anime-cover { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .anime-title { font-weight: bold; color: #fff; }
        .anime-meta { color: #8b8bb3; font-size: 0.9em; }
        .anime-time { color: #ffc107; }
        .day-header { background: #3d3d5c; padding: 15px; border-radius: 8px; margin: 25px 0 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn btn-outline-light mb-4">← Menu Principal</a>
        <h2 class="mb-4">📥 Téléchargements & Calendrier</h2>
        
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#active">Actifs</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#available">Disponibles</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#schedule">Calendrier</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="active">
                <h4 class="text-success mb-3">Téléchargements en cours</h4>
                <div id="active-downloads">
                    <div class="text-center text-secondary">Chargement...</div>
                </div>
            </div>
            <div class="tab-pane fade" id="available">
                <h4 class="text-info mb-3">Épisodes disponibles au téléchargement</h4>
                <div id="available-downloads">
                    <div class="text-center text-secondary">Chargement...</div>
                </div>
            </div>
            <div class="tab-pane fade" id="schedule">
                <h4 class="text-warning mb-3">Prochaines sorties</h4>
                <div id="schedule-list">
                    <div class="text-center text-secondary">Chargement...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function getEnglishTitle(nomComplet) {
            if (!nomComplet) return '';
            const parts = nomComplet.split(' ;;; ');
            return parts.length > 1 ? parts[1].trim() : parts[0].trim();
        }

        function formatEpisodeRange(eps) {
            if (!eps || eps.length === 0) return '';
            eps = [...eps].sort((a, b) => a - b);
            let ranges = [];
            let start = eps[0];
            let end = eps[0];
            for (let i = 1; i < eps.length; i++) {
                if (eps[i] === end + 1) {
                    end = eps[i];
                } else {
                    if (start === end) {
                        ranges.push(start);
                    } else {
                        ranges.push(start + '-' + end);
                    }
                    start = end = eps[i];
                }
            }
            if (start === end) {
                ranges.push(start);
            } else {
                ranges.push(start + '-' + end);
            }
            return ranges.join(', ');
        }

        function loadDashboard() {
            fetch('/api/downloads/dashboard')
                .then(r => r.json())
                .then(data => {
                    const activeDiv = document.getElementById('active-downloads');
                    if (data.active && data.active.length > 0) {
                        activeDiv.innerHTML = data.active.map(d => `
                            <div class="card episode-card active-download p-3 d-flex align-items-center">
                                <div class="me-3">
                                    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="text-light fw-bold">${d.name || d.key}</div>
                                    <div class="text-success">${d.progress || 0}%</div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        activeDiv.innerHTML = '<div class="text-secondary">Aucun téléchargement actif</div>';
                    }

                    const availDiv = document.getElementById('available-downloads');
                    if (data.available && data.available.length > 0) {
                        availDiv.innerHTML = data.available.map(a => `
                            <div class="card episode-card p-3 d-flex align-items-center">
                                <img src="${a.local_cover || a.img || ''}" class="anime-cover me-3" onerror="this.src='${a.img || ''}'" />
                                <div class="flex-grow-1">
                                    <div class="anime-title">${getEnglishTitle(a.nom_complet)}</div>
                                    <div class="anime-meta">Épisodes: ${formatEpisodeRange(a.episodes)}</div>
                                </div>
                                <a href="/en" class="btn btn-sm btn-outline-primary">Télécharger</a>
                            </div>
                        `).join('');
                    } else {
                        availDiv.innerHTML = '<div class="text-secondary">Aucun épisode disponible</div>';
                    }
                })
                .catch(e => console.error(e));
        }

        fetch('/api/schedule')
            .then(r => r.json())
            .then(data => {
                const scheduleDiv = document.getElementById('schedule-list');
                if (data.success && data.schedule && data.schedule.length > 0) {
                    let html = '';
                    data.schedule.forEach(dayBlock => {
                        html += `<div class="day-header"><h5 class="mb-0">${dayBlock.day_name} ${dayBlock.day_num} ${dayBlock.month}</h5></div>`;
                        
                        dayBlock.animes.forEach(item => {
                            html += `
                                <div class="card episode-card p-3 d-flex align-items-center">
                                    <img src="${item.cover || ''}" class="anime-cover me-3" onerror="this.style.display='none'" />
                                    <div class="flex-grow-1">
                                        <div class="anime-title">${item.title}</div>
                                        <div class="anime-meta">Épisode ${item.episode} - ${dayBlock.day_name}</div>
                                    </div>
                                    <div class="anime-time">${item.airing_time}</div>
                                </div>
                            `;
                        });
                    });
                    scheduleDiv.innerHTML = html;
                } else {
                    scheduleDiv.innerHTML = '<div class="text-secondary">Aucune upcoming release</div>';
                }
            })
            .catch(e => {
                document.getElementById('schedule-list').innerHTML = '<div class="text-danger">Erreur de chargement</div>';
            });

        loadDashboard();
        setInterval(loadDashboard, 5000);
    </script>
</body>
</html>
